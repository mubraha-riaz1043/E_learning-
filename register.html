{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;padding:4rem 1rem">
  <div class="text-center mb-4">
    <div style="font-size:2.5rem;margin-bottom:.5rem">🚀</div>
    <h1 style="font-size:1.8rem;font-weight:700;color:#fff">Create Account</h1>
    <p style="color:var(--muted)">Join thousands of learners today</p>
  </div>
  <div class="card-dark p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" placeholder="Jane Doe" required/>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="jane@example.com" required/>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" minlength="6" required/>
      </div>
      <button type="submit" class="btn-accent btn w-100">Create Account <i class="bi bi-person-check ms-1"></i></button>
    </form>
    <p class="text-center mt-3 mb-0" style="color:var(--muted);font-size:.9rem">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent2)">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
